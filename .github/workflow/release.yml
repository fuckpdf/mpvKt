name: Release Signed APKs

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get tag name
        run: echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Prepare Signed APKs
        run: |
          mkdir -p release-files
          cp app/build/outputs/apk/release/*-signed*.apk release-files/ || true
          # Eğer universal varsa rename et
          for file in release-files/*; do
            newname=$(echo \( file | sed "s/app-\(.*\)-release-signed/apkKt-\1- \){{ env.VERSION_TAG }}/g")
            mv "$file" "$newname" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: mpvKt ${{ env.VERSION_TAG }}
          draft: true  # İstersen false yap, direkt yayınlansın
          prerelease: false
          files: release-files/*
          body: |
            Signed APKs for mpvKt ${{ env.VERSION_TAG }}
            
            - Download from artifacts below.
            - SHA256 checksums will be added manually if needed.
