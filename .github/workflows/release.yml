name: mpvKt - Build & Signed Release

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # ← Manuel "Run workflow" butonu için zorunlu!

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APKs
        run: ./gradlew assembleRelease  # detekt timeout'u önlemek için detekt'i atla

      - name: Sign APKs (only on tag or manual dispatch)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Unsigned Artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: mpvKt-unsigned-apks
          path: |
            app/build/outputs/apk/release/*-unsigned.apk

      - name: Get tag name (for release)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION_TAG=manual-test-${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
          fi

      - name: Prepare Signed Files for Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p release-files
          cp app/build/outputs/apk/release/*-signed*.apk release-files/ || true
          # İsimleri güzelleştir (örneğin mpvKt-arm64-v0.1.6.apk)
          for file in release-files/*; do
            if [ -f "$file" ]; then
              newname=$(echo "\( file" | sed "s/app-\(.*\)-release-signed/mpvKt-\1- \){{ env.VERSION_TAG }}/g" | sed 's/-signed//g')
              mv "$file" "$newname" || true
            fi
          done

      - name: Create/Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: mpvKt ${{ env.VERSION_TAG }}
          draft: true  # İstersen false yap, direkt yayınlansın
          prerelease: false
          files: release-files/*
          body: |
            Signed APKs for mpvKt ${{ env.VERSION_TAG }}
            
            - Universal, arm64-v8a vb. varyantlar mevcut.
            - Manuel tetiklendiyse test sürümüdür.
